<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>

    <!-- Ambient gold glow behind the letters -->
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="52%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle letter glow: blurred copy merged under sharp original -->
    <filter id="letter-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark navy background, rounded to match Product Hunt's circular crop -->
  <rect width="240" height="240" rx="48" fill="#0f1524"/>

  <!-- Ambient glow layer -->
  <ellipse cx="120" cy="116" rx="108" ry="100" fill="url(#bg-glow)"/>

  <!-- Hairline gold border -->
  <rect x="1.5" y="1.5" width="237" height="237" rx="47" fill="none"
        stroke="#C9A84C" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- MS monogram -->
  <text
    x="120"
    y="120"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="90"
    letter-spacing="-2"
    fill="#C9A84C"
    filter="url(#letter-glow)"
  >MS</text>
</svg>
