name: Generate Fortnightly Blog Post

on:
  schedule:
    - cron: '0 9 1,15 * *'  # 1st and 15th of each month at 9am UTC
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate-post

      - name: Commit and push new post
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add lib/generatedPosts.json scripts/keywords.json
          git diff --staged --quiet || git commit -m "Auto: new blog post generated"
          git push
